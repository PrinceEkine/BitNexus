    <style>
        :root {
          --sat: env(safe-area-inset-top);
          --sab: env(safe-area-inset-bottom);
        }
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: contain;
            background-color: #f8fafc;
            padding-top: var(--sat);
            padding-bottom: var(--sab);
        }
        html.dark body { background-color: #020617; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        /* Professional POS Printing Styles */
        @media print {
            body { 
                background: white !important; 
                margin: 0; 
                padding: 0; 
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            
            @page {
                margin: 0;
            }

            /* Receipt Sizing */
            .receipt-container {
                width: 72mm; /* Standard printable width for 80mm roll */
                margin: 0 auto;
                padding: 2mm;
                box-sizing: border-box;
                overflow: hidden;
            }

            .receipt-container.size-58mm {
                width: 48mm; /* Standard printable width for 58mm roll */
                padding: 1mm;
            }

            /* Barcode Label Sizing (1.5" x 1" = 38.1mm x 25.4mm) */
            .label-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, 38.1mm);
                gap: 2mm;
                padding: 5mm;
                justify-content: center;
            }

            .barcode-label {
                width: 38.1mm;
                height: 25.4mm;
                border: 0.1mm solid #eee;
                padding: 1.5mm;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: space-between;
                page-break-inside: avoid;
                overflow: hidden;
                box-sizing: border-box;
            }
            
            /* Remove standard browser headers/footers */
            @page { size: auto;  margin: 0mm; }
        }
        .print-only { display: none; }
    </style>
